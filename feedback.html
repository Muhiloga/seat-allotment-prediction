<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            padding: 40px;
            text-align: center;
        }

        h2 {
            color: #d36b94;
        }

        form {
            background-color: #fff;
            padding: 20px;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
        }

        label {
            font-size: 1.2rem;
            color: #333;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 1rem;
            margin-top: 10px;
        }

        input[type="submit"] {
            background-color: #d36b94;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
            margin-top: 20px;
        }

        input[type="submit"]:hover {
            background-color: #c85a82;
            font-weight: bold;
            transform: scale(1.05);
        }

        .back-link {
            margin-top: 20px;
            display: inline-block;
            font-size: 1.1rem;
            text-decoration: none;
            color: #007bff;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #0056b3;
        }

        /* Flash message styling */
        ul {
            list-style: none;
            padding: 0;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

    <h2>Submit Your Feedback</h2>

    <!-- Flash messages for success or error feedback submission -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <ul>
        {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
        {% endfor %}
        </ul>
    {% endif %}
    {% endwith %}

    <!-- Feedback form -->
    <form action="{{ url_for('submit_feedback') }}" method="POST">
        <label for="feedback">Feedback:</label><br>
        <textarea id="feedback" name="feedback_text" rows="4" cols="50" required></textarea><br><br>
        <input type="submit" value="Submit">
    </form>

    <!-- Back to Home link -->
    <a class="back-link" href="{{ url_for('index') }}">Back to Home</a>

</body>
</html>
