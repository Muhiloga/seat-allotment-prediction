<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Reviews</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            color: #333;
            padding: 40px;
            text-align: center;
        }
        .review-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .review-card {
            margin-bottom: 20px;
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }
        .review-card:last-child {
            border-bottom: none;
        }
        .review-card h3 {
            margin-bottom: 10px;
            color: #d36b94;
        }
        .review-card p {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="review-container">
        <h1>User Reviews</h1>
        {% for review in reviews %}
        <div class="review-card">
            <h3>{{ review.feedback_text }}- {{ review.username }}</h3>
        </div>
        {% endfor %}
    </div>
</body>
</html>
