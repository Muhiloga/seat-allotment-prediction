<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        /* General Styling */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1e1e2d;
            color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .signup-container {
            background-color: #282846;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0px 8px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            color: #f5f5f5;
            margin-bottom: 30px;
            font-weight: 600;
            text-transform: uppercase;
        }

        p {
            color: #cccccc;
            font-size: 14px;
        }

        /* Form Styling */
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        label {
            text-align: left;
            font-size: 14px;
            margin-bottom: 5px;
            color: #bbbbbb;
            width: 100%;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #444;
            background-color: #33334a;
            border-radius: 8px;
            font-size: 16px;
            color: #ffffff;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #bbbbbb;
        }

        input[type="submit"] {
            padding: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s ease;
            width: 100%;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        .error {
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 20px;
        }

        a {
            text-decoration: none;
            color: #4CAF50;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .signup-container {
                padding: 20px;
                max-width: 90%;
            }

            h1 {
                font-size: 22px;
            }
        }

    </style>
</head>

<body>
    <div class="signup-container">
        <h1>Create Account</h1>

        <!-- Display error message if there is any -->
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <!-- Signup Form -->
        <form action="{{ url_for('signup') }}" method="POST">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required placeholder="Choose a username">

            <label for="password">Password</label>
            <input type="password" name="password" id="password" required placeholder="Choose a password">

            <input type="submit" value="Sign Up">
        </form>

        <!-- Link to login page -->
        <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</body>

</html>
