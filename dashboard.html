<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #343a40; /* Dark background color */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ffffff; /* Light text color for contrast */
        }

        .dashboard-container {
            background-color: #495057; /* Slightly lighter dark for the container */
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.5); /* Deeper shadow for depth */
            text-align: center;
            max-width: 400px; /* Set a maximum width */
            width: 100%; /* Full width on smaller screens */
        }

        h1 {
            margin-bottom: 20px;
            color: #f8f9fa; /* Light color for heading */
            font-size: 2.2em; /* Increased font size for prominence */
        }

        p {
            margin-bottom: 30px;
            color: #dee2e6; /* Lighter color for paragraph */
            font-size: 1.1em; /* Slightly larger paragraph text */
        }

        .option-button {
            padding: 15px 30px;
            background-color: #667eea; /* Primary button color */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin: 10px;
            display: inline-block;
            transition: background-color 0.3s ease, transform 0.2s ease; /* Added transform for scale effect */
            font-size: 1em; /* Increased font size for buttons */
        }

        .option-button:hover {
            background-color: #5661d5; /* Darker shade on hover */
            transform: scale(1.05); /* Slightly enlarge button on hover */
        }

        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #adb5bd; /* Light color for footer text */
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>Welcome, {{ session['username'] }}</h1>
        <p>What would you like to do?</p>
        <a href="{{ url_for('college_list') }}" class="option-button">Check College Details</a>
        <a href="{{ url_for('index') }}" class="option-button">Predict Seat Allotment</a>
        <div class="footer">
            <p>All rights reserved. This project is for educational purposes only.</p>
        </div>        
    </div>
</body>
</html>
